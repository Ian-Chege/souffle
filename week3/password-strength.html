<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Strength Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }

    /* ── Input ── */
    .input-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 0.65rem 2.8rem 0.65rem 0.85rem;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4f46e5; }

    /* show/hide toggle */
    #toggleBtn {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #888;
      padding: 0;
    }

    /* ── Strength bar ── */
    .bar-track {
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
    }

    .strength-label {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      min-height: 1.1rem;
    }

    /* ── Checklist ── */
    .checklist { list-style: none; }

    .checklist li {
      font-size: 0.88rem;
      color: #6b7280;
      margin-bottom: 0.45rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.2s;
    }

    .checklist li .icon {
      font-style: normal;
      font-size: 1rem;
      width: 1.2rem;
      text-align: center;
    }

    .checklist li.pass { color: #22c55e; }
    .checklist li.fail { color: #9ca3af; }
  </style>
</head>
<body>

<div class="card">
  <h2>Password Strength</h2>

  <!-- Input -->
  <div class="input-wrap">
    <input type="password" id="passwordInput" placeholder="Type a password…" />
    <button id="toggleBtn" type="button" title="Show / hide">👁</button>
  </div>

  <!-- Strength bar + label -->
  <div class="bar-track">
    <div class="bar-fill" id="barFill"></div>
  </div>
  <div class="strength-label" id="strengthLabel"></div>

  <!-- Requirement checklist -->
  <ul class="checklist">
    <li id="req-length"><span class="icon">○</span> At least 8 characters</li>
    <li id="req-upper"> <span class="icon">○</span> One uppercase letter (A–Z)</li>
    <li id="req-lower"> <span class="icon">○</span> One lowercase letter (a–z)</li>
    <li id="req-number"><span class="icon">○</span> One number (0–9)</li>
    <li id="req-symbol"><span class="icon">○</span> One symbol (!@#$…)</li>
  </ul>
</div>

<script>
  // ── Rules: each rule has an id, a label, and a test function ─────────────

  const rules = [
    { id: 'req-length', test: p => p.length >= 8 },
    { id: 'req-upper',  test: p => /[A-Z]/.test(p) },
    { id: 'req-lower',  test: p => /[a-z]/.test(p) },
    { id: 'req-number', test: p => /[0-9]/.test(p) },
    { id: 'req-symbol', test: p => /[^A-Za-z0-9]/.test(p) },
  ];

  // ── Strength levels: based on how many rules pass ─────────────────────────

  const levels = [
    { label: '',          color: '#e5e7eb', width: '0%'   },  // 0 rules — empty
    { label: 'Very Weak', color: '#ef4444', width: '20%'  },  // 1 rule
    { label: 'Weak',      color: '#f97316', width: '40%'  },  // 2 rules
    { label: 'Fair',      color: '#eab308', width: '60%'  },  // 3 rules
    { label: 'Strong',    color: '#22c55e', width: '80%'  },  // 4 rules
    { label: 'Very Strong', color: '#16a34a', width: '100%' },// 5 rules
  ];

  // ── Main function: runs every time the user types ─────────────────────────

  function checkStrength(password) {
    let passed = 0;

    // Check each rule and update its list item
    rules.forEach(rule => {
      const ok = rule.test(password);
      if (ok) passed++;

      const li   = document.getElementById(rule.id);
      const icon = li.querySelector('.icon');

      if (ok) {
        li.classList.add('pass');
        li.classList.remove('fail');
        icon.textContent = '✓';
      } else {
        li.classList.remove('pass');
        li.classList.add('fail');
        icon.textContent = '○';
      }
    });

    // Pick the right strength level (0 if password is empty)
    const level = password.length === 0 ? levels[0] : levels[passed];

    // Update the bar
    const bar = document.getElementById('barFill');
    bar.style.width      = level.width;
    bar.style.background = level.color;

    // Update the label
    const label = document.getElementById('strengthLabel');
    label.textContent = level.label;
    label.style.color = level.color;
  }

  // ── Listen for typing ─────────────────────────────────────────────────────

  document.getElementById('passwordInput').addEventListener('input', function () {
    checkStrength(this.value);
  });

  // ── Show / hide password toggle ───────────────────────────────────────────

  document.getElementById('toggleBtn').addEventListener('click', function () {
    const input = document.getElementById('passwordInput');
    const isHidden = input.type === 'password';
    input.type     = isHidden ? 'text' : 'password';
    this.textContent = isHidden ? '🙈' : '👁';
  });
</script>

</body>
</html>
